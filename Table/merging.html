<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Merging cells</title>
  </head>
  <body>
    <h1>Col span</h1>
    <table border="1">
      <tr>
        <th colspan="2">Fruit Store</th>
      </tr>
      <tr>
        <td>Apple</td>
        <td>120</td>
      </tr>
      <tr>
        <td>Banana</td>
        <td>20</td>
      </tr>
    </table>
    <h1>Row span</h1>
    <table border="1">
        <tr>
            <th rowspan="3">Fruit</th>
            <td>Apple</td>
        </tr>
        <tr>
            <td>banana</td>
        </tr>
        <tr>
            <td>Orange</td>
        </tr>
    </table>
  </body>
</html>
